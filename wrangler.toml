# JotModel — Cloudflare Worker (Phases 2–3). Authored for local `wrangler dev`;
# real ids/secrets are filled in at deploy time (see README → Deploy).
name = "jotmodel"
main = "worker/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Durable Object: one per board, holds the authoritative Y.Doc (y-partyserver).
[[durable_objects.bindings]]
name = "JotBoard"
class_name = "JotBoard"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["JotBoard"]

# D1: identity, ownership, sharing (the metadata; the drawing lives in the CRDT).
[[d1_databases]]
binding = "DB"
database_name = "jotmodel"
database_id = "b19c42df-8010-432a-91e0-92cf504662d9"   # `wrangler d1 create jotmodel` prints this

# R2: CRDT snapshots / exports (no egress fees).
[[r2_buckets]]
binding = "SNAPSHOTS"
bucket_name = "jotmodel-snapshots"

# Custom domain for the API + WebSocket relay. `wrangler deploy` provisions it (domain must
# already be on this Cloudflare account). The app talks to it via VITE_WORKER_HOST.
[[routes]]
pattern = "api.jotmodel.com"
custom_domain = true

[vars]
# Production origin — must EXACTLY equal the app origin and Clerk's `azp` (no trailing slash).
APP_ORIGIN = "https://app.jotmodel.com"
# For local `wrangler dev`, override this to http://localhost:5173 in worker/.dev.vars.
# Secrets (NOT here): set with `wrangler secret put CLERK_SECRET_KEY` and `CLERK_JWT_KEY`.
