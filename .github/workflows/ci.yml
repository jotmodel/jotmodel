name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']  # doc-only changes don't trigger a redeploy
  pull_request:
    branches: [main]
  workflow_dispatch: {}  # manual "Run workflow" → also enables the worker deploy job

jobs:
  verify:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Build app
        run: npm run build
        env:
          # VITE_WORKER_HOST comes from .env.production; the Clerk key is a repo secret.
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

  # Auto-deploy the frontend + marketing site on every push to main. The CI token only needs
  # Cloudflare Pages: Edit for these.
  deploy-pages:
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build app
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      - name: Deploy app (app.jotmodel.com)
        run: npx wrangler pages deploy dist --project-name jotmodel-app --branch main
      - name: Deploy marketing site (jotmodel.com)
        run: npx wrangler pages deploy site --project-name jotmodel-site --branch main

  # The worker is deployed manually (it changes rarely): either `npm run deploy:worker` locally
  # with your OAuth wrangler, or trigger this workflow via "Run workflow" (Actions → CI). Note:
  # `wrangler deploy` reconciles the api.jotmodel.com custom-domain route, so for THIS job the CI
  # token must also have Zone→Workers Routes→Edit and Zone→DNS→Edit (jotmodel.com); otherwise it
  # will fail with code 10000 and you should deploy the worker locally instead.
  deploy-worker:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Deploy worker (api.jotmodel.com)
        run: npx wrangler deploy
